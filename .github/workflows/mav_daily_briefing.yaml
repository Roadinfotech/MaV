name: MaV Daily Briefing Pipeline

on:
  schedule:
    # 매일 UTC 22:00 (한국 시간 오전 7:00) 자동 실행
    - cron: '0 22 * * *'
  workflow_dispatch: # GitHub 웹에서 수동 실행(테스트용) 버튼 활성화

jobs:
  run-mav-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step 2 - Data Fetch & AI Analysis
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python step2_mav_briefing.py

      - name: Step 4 - Send Email Briefing
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python step4_send_email.py